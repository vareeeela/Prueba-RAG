rutas:
  documentos: "documentos"
  bd_vectorial: "bd_vectorial"
  coleccion: "documentos_rag"

embeddings:
  modelo: "intfloat/multilingual-e5-large"

retrieval:
  n_resultados: 5
  chunk_size: 800
  chunk_overlap: 150
  min_chunk_len: 50
  similarity_threshold: 0.5
  n_query_variants: 3
  extensiones:
    - ".pdf"
    - ".docx"
    - ".pptx"
    - ".xlsx"
    - ".txt"
    - ".md"

llm:
  modo: "groq"
  modelo_groq: "llama-3.3-70b-versatile"
  modelo_local: "llama3.2"
