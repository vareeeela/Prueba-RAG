rutas:
  documentos: "documentos"
  bd_vectorial: "bd_vectorial"
  coleccion: "documentos_rag"

embeddings:
  modelo: "intfloat/multilingual-e5-large"

retrieval:
  n_resultados: 4
  chunk_size: 1200
  chunk_overlap: 200
  min_chunk_len: 80
  similarity_threshold: 0.45
  n_query_variants: 2
  extensiones:
    - ".pdf"
    - ".docx"
    - ".pptx"
    - ".xlsx"
    - ".txt"
    - ".md"

llm:
  modo: "groq"
  modelo_groq: "llama-3.3-70b-versatile"
  modelo_local: "llama3.2"
  max_turnos_historial: 6
  temperature: 0.2
  max_tokens: 600
